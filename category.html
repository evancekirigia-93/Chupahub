<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category | ChupaHub</title><link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div class="topbar">Fast Nairobi delivery • Call/WhatsApp: 0700 000 000</div>
<header class="header"><a class="logo" href="index.html">CHUPA<span>HUB</span></a><a href="index.html">Home</a><button id="cartButton">Cart (<span id="cartCount">0</span>)</button></header>
<main class="section">
  <div class="breadcrumbs"><a href="index.html">Home</a> / <span id="categoryName">Category</span></div>
  <div class="section-heading"><div><p class="eyebrow">Collection</p><h1 id="categoryTitle">Products</h1></div></div>
  <div class="filters"><input id="categorySearch" placeholder="Search this category"><select id="sortSelect"><option value="">Sort</option><option value="price_asc">Price: Low to high</option><option value="price_desc">Price: High to low</option></select></div>
  <div class="product-grid" id="categoryProducts"></div>
</main>
<aside class="cart-drawer" id="cartDrawer"><div class="cart-head"><h2>Your cart</h2><button id="closeCart">×</button></div><div id="cartItems"></div><div class="cart-total"><strong>Total</strong><strong id="cartTotal">KSh 0</strong></div><a class="primary-btn full" href="checkout.html">Checkout</a></aside><div class="overlay" id="overlay"></div>
<script src="assets/js/config.js"></script><script src="assets/js/app.js"></script>
</body></html>
