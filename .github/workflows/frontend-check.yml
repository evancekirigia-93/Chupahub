name: Frontend checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chupahub/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: chupahub/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
